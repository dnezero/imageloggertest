    <script>
        // Webhook logic
        const webhookUrl = "hi little spammer with your edgy tools, this was just a test of the image logger that im making, thanks for reminding me that this works.";

        async function notifyDiscord() {
            try {
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: "Someone just visited your page!"
                    })
                });
            } catch (error) {
                console.error("Could not reach the webhook:", error);
            }
        }

        // Run the notification when the page loads
        notifyDiscord();
